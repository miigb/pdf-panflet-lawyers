<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LETRAPERFEIÇOADA — Pamphlet Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #ccc; height: 100vh; overflow: hidden; }

  /* ═══ 3-PANEL LAYOUT ═══ */
  .app { display: grid; grid-template-columns: 180px 1fr 340px; height: 100vh; }

  /* ═══ LEFT SIDEBAR — Template Thumbnails ═══ */
  .sidebar-left {
    background: #111; border-right: 1px solid #1e1e1e;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-left-header {
    padding: 16px 14px 12px; border-bottom: 1px solid #1e1e1e;
  }
  .sidebar-left-header .brand {
    font-size: 13px; font-weight: 900; letter-spacing: -0.02em; color: white; margin-bottom: 4px;
  }
  .sidebar-left-header .brand span { color: #BA2979; }
  .sidebar-left-header h2 {
    font-size: 10px; font-weight: 800; letter-spacing: 0.1em;
    text-transform: uppercase; color: #555;
  }

  .thumbs-list {
    flex: 1; overflow-y: auto; padding: 8px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .thumbs-list::-webkit-scrollbar { width: 4px; }
  .thumbs-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .thumb-card {
    border: 2px solid #222; border-radius: 8px;
    overflow: hidden; cursor: pointer; transition: all 0.2s;
    background: #0d0d0d; flex-shrink: 0;
  }
  .thumb-card:hover { border-color: #444; }
  .thumb-card.active { border-color: #BA2979; box-shadow: 0 0 12px rgba(186,41,121,0.2); }

  .thumb-iframe-wrap {
    width: 100%; height: 210px; overflow: hidden;
    position: relative; pointer-events: none;
  }
  .thumb-iframe-wrap iframe {
    width: 210mm; height: 297mm;
    transform: scale(0.19); transform-origin: top left;
    border: none; background: white;
    pointer-events: none;
  }
  .thumb-label {
    padding: 6px 10px; font-size: 9px; font-weight: 700;
    display: flex; justify-content: space-between; align-items: center;
  }
  .thumb-label .name { color: white; }
  .thumb-label .tag {
    font-size: 7px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.06em; color: #BA2979;
    background: rgba(186,41,121,0.1); padding: 2px 6px; border-radius: 3px;
  }

  /* ═══ CENTER — Preview ═══ */
  .preview-area {
    background: #1a1a1a; display: flex; flex-direction: column;
    align-items: center; overflow: auto; padding: 24px 20px;
  }
  .preview-area::-webkit-scrollbar { width: 6px; }
  .preview-area::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

  #main-frame {
    width: 210mm; height: 297mm; border: none;
    border-radius: 4px; background: white;
    box-shadow: 0 16px 60px rgba(0,0,0,0.5);
    flex-shrink: 0;
  }

  /* ═══ RIGHT SIDEBAR — Edit Fields ═══ */
  .sidebar-right {
    background: #111; border-left: 1px solid #1e1e1e;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-right-header {
    padding: 16px 18px 12px; border-bottom: 1px solid #1e1e1e;
    display: flex; justify-content: space-between; align-items: center;
  }
  .sidebar-right-header h2 {
    font-size: 11px; font-weight: 800; letter-spacing: 0.06em;
    text-transform: uppercase; color: #888;
  }
  .btn-download {
    background: #BA2979; color: white; border: none;
    padding: 8px 16px; border-radius: 6px;
    font-family: 'Inter', sans-serif; font-size: 9px; font-weight: 800;
    cursor: pointer; transition: background 0.2s;
    letter-spacing: 0.02em;
  }
  .btn-download:hover { background: #d43a8f; }

  .fields-container {
    flex: 1; overflow-y: auto; padding: 12px 18px 24px;
  }
  .fields-container::-webkit-scrollbar { width: 4px; }
  .fields-container::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  /* Section groups */
  .field-section { margin-bottom: 20px; }
  .field-section-title {
    font-size: 8px; font-weight: 800; letter-spacing: 0.15em;
    text-transform: uppercase; color: #BA2979; margin-bottom: 10px;
    padding-bottom: 6px; border-bottom: 1px solid #1e1e1e;
  }

  .field-group { margin-bottom: 10px; }
  .field-group label {
    display: block; font-size: 9px; font-weight: 600;
    color: #666; margin-bottom: 4px; letter-spacing: 0.02em;
  }
  .field-group input[type="text"],
  .field-group textarea {
    width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a;
    color: #ddd; padding: 8px 10px; border-radius: 6px;
    font-family: 'Inter', sans-serif; font-size: 11px;
    transition: border-color 0.2s; resize: vertical;
  }
  .field-group input[type="text"]:focus,
  .field-group textarea:focus {
    outline: none; border-color: #BA2979;
  }
  .field-group textarea { min-height: 52px; }

  /* Image upload */
  .image-upload {
    position: relative; border: 2px dashed #2a2a2a; border-radius: 8px;
    padding: 12px; text-align: center; cursor: pointer;
    transition: border-color 0.2s; overflow: hidden;
  }
  .image-upload:hover { border-color: #BA2979; }
  .image-upload input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
  }
  .image-upload .upload-text {
    font-size: 9px; color: #555; font-weight: 600;
  }
  .image-upload .upload-text .icon { font-size: 16px; display: block; margin-bottom: 4px; }
  .image-upload img {
    max-width: 100%; max-height: 80px; border-radius: 4px;
    object-fit: cover; display: none;
  }
  .image-upload.has-image img { display: block; }
  .image-upload.has-image .upload-text { display: none; }

  /* Avatar upload */
  .avatar-upload {
    width: 72px; height: 72px; border-radius: 50%;
    border: 2px dashed #2a2a2a; overflow: hidden;
    position: relative; cursor: pointer; transition: border-color 0.2s;
    display: flex; align-items: center; justify-content: center;
    background: #1a1a1a; flex-shrink: 0;
  }
  .avatar-upload:hover { border-color: #BA2979; }
  .avatar-upload input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
  }
  .avatar-upload .avatar-placeholder { font-size: 22px; color: #333; }
  .avatar-upload img {
    width: 100%; height: 100%; object-fit: cover; display: none;
  }
  .avatar-upload.has-image img { display: block; }
  .avatar-upload.has-image .avatar-placeholder { display: none; }

  /* Loading state */
  .fields-loading {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 200px; color: #444;
    font-size: 11px; font-weight: 600; text-align: center;
  }
  .fields-loading .spinner {
    width: 24px; height: 24px; border: 2px solid #222;
    border-top-color: #BA2979; border-radius: 50%;
    animation: spin 0.6s linear infinite; margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ═══ PRINT STYLES ═══ */
  @media print {
    body { background: white; }
    .sidebar-left, .sidebar-right { display: none !important; }
    .app { display: block !important; }
    .preview-area { padding: 0 !important; background: white !important; overflow: visible !important; }
    #main-frame { box-shadow: none !important; width: 100% !important; height: 100vh !important; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- LEFT SIDEBAR -->
  <div class="sidebar-left">
    <div class="sidebar-left-header">
      <div class="brand"><span>LP</span> Editor</div>
      <h2>Templates</h2>
    </div>
    <div class="thumbs-list" id="thumbs-list"></div>
  </div>

  <!-- CENTER PREVIEW -->
  <div class="preview-area">
    <iframe id="main-frame" src=""></iframe>
  </div>

  <!-- RIGHT SIDEBAR -->
  <div class="sidebar-right">
    <div class="sidebar-right-header">
      <h2>Edit Fields</h2>
      <button class="btn-download" onclick="downloadPDF()">Download PDF</button>
    </div>
    <div class="fields-container" id="fields-container">
      <div class="fields-loading">
        <div class="spinner"></div>
        Select a template to start editing
      </div>
    </div>
  </div>
</div>

<script>
  const versions = [
    { file: 'pamphlet-v1-editorial.html', name: 'V1', tag: 'Editorial' },
    { file: 'pamphlet-v2-executive.html', name: 'V2', tag: 'Executive' },
    { file: 'pamphlet-v3-minimalist.html', name: 'V3', tag: 'Minimalist' },
    { file: 'pamphlet-v4-dark.html', name: 'V4', tag: 'Dark' },
    { file: 'pamphlet-v5-magazine.html', name: 'V5', tag: 'Magazine' },
    { file: 'pamphlet-v6-corporate.html', name: 'V6', tag: 'Corporate' },
    { file: 'pamphlet-v7-gradient.html', name: 'V7', tag: 'Gradient' },
    { file: 'pamphlet-v8-dark-alt.html', name: 'V8', tag: 'Dark Alt' },
    { file: 'pamphlet-v9-asymmetric.html', name: 'V9', tag: 'Asymmetric' },
    { file: 'pamphlet-v10-swiss.html', name: 'V10', tag: 'Swiss' },
    { file: 'pamphlet-v11-sidebar.html', name: 'V11', tag: 'Sidebar' },
  ];

  let currentVersion = 0;
  const mainFrame = document.getElementById('main-frame');
  const fieldsContainer = document.getElementById('fields-container');
  const thumbsList = document.getElementById('thumbs-list');

  const sectionNames = {
    header: 'Header',
    hero: 'Hero Section',
    stats: 'Statistics',
    process: 'Process Steps',
    features: 'Features / Why Us',
    challenges: 'Challenges & Solutions',
    quote: 'Testimonial',
    agent: 'Agent / Contact',
    cta: 'Call to Action',
  };

  // Build thumbnail cards
  versions.forEach((v, i) => {
    const card = document.createElement('div');
    card.className = 'thumb-card' + (i === 0 ? ' active' : '');
    card.innerHTML =
      '<div class="thumb-iframe-wrap">' +
        '<iframe src="' + v.file + '" loading="lazy" tabindex="-1"></iframe>' +
      '</div>' +
      '<div class="thumb-label">' +
        '<span class="name">' + v.name + '</span>' +
        '<span class="tag">' + v.tag + '</span>' +
      '</div>';
    card.onclick = function() { selectTemplate(i); };
    thumbsList.appendChild(card);
  });

  function selectTemplate(i) {
    currentVersion = i;
    document.querySelectorAll('.thumb-card').forEach(function(c, idx) {
      c.classList.toggle('active', idx === i);
    });
    fieldsContainer.innerHTML = '<div class="fields-loading"><div class="spinner"></div>Loading fields...</div>';
    mainFrame.src = versions[i].file;
  }

  mainFrame.addEventListener('load', function() {
    setTimeout(scanFields, 300);
  });

  function scanFields() {
    var doc = mainFrame.contentDocument;
    if (!doc) {
      fieldsContainer.innerHTML = '<div class="fields-loading">Cannot access iframe content</div>';
      return;
    }

    var elements = doc.querySelectorAll('[data-field]');
    if (elements.length === 0) {
      fieldsContainer.innerHTML = '<div class="fields-loading">No editable fields in this template.<br><br><span style="font-size:9px;color:#555;">Add data-field attributes to enable editing.</span></div>';
      return;
    }

    // Group by section
    var sections = {};
    var sectionOrder = [];
    elements.forEach(function(el) {
      var section = el.dataset.section || 'other';
      if (!sections[section]) {
        sections[section] = [];
        sectionOrder.push(section);
      }
      sections[section].push(el);
    });

    fieldsContainer.innerHTML = '';

    // Avatar upload at top if agent section exists
    if (sections.agent) {
      var avatarEl = doc.querySelector('[data-field-type="avatar"]');
      var avatarGroup = document.createElement('div');
      avatarGroup.className = 'field-group';
      avatarGroup.style.cssText = 'display:flex;align-items:center;gap:14px;margin-bottom:16px;';
      var hasSrc = avatarEl && avatarEl.getAttribute('src');
      avatarGroup.innerHTML =
        '<div class="avatar-upload ' + (hasSrc ? 'has-image' : '') + '" id="avatar-upload">' +
          '<div class="avatar-placeholder">+</div>' +
          '<img id="avatar-preview" src="' + (hasSrc || '') + '"/>' +
          '<input type="file" accept="image/*" onchange="handleAvatarUpload(this)"/>' +
        '</div>' +
        '<div>' +
          '<label style="margin-bottom:2px;">Agent Photo</label>' +
          '<span style="font-size:8px;color:#444;">Click to upload</span>' +
        '</div>';
      fieldsContainer.appendChild(avatarGroup);
    }

    // Render sections
    sectionOrder.forEach(function(sectionKey) {
      var els = sections[sectionKey];
      var sectionDiv = document.createElement('div');
      sectionDiv.className = 'field-section';

      var title = document.createElement('div');
      title.className = 'field-section-title';
      title.textContent = sectionNames[sectionKey] || sectionKey.replace(/-/g, ' ');
      sectionDiv.appendChild(title);

      els.forEach(function(el) {
        var fieldType = el.dataset.fieldType || 'text';
        var label = el.dataset.label || el.dataset.field.replace(/-/g, ' ');
        var fieldId = sectionKey + '--' + el.dataset.field;

        var group = document.createElement('div');
        group.className = 'field-group';

        if (fieldType === 'image') {
          var currentSrc = el.tagName === 'IMG' ? el.getAttribute('src') : '';
          group.innerHTML =
            '<label>' + label + '</label>' +
            '<div class="image-upload ' + (currentSrc ? 'has-image' : '') + '" id="img-' + fieldId + '">' +
              '<div class="upload-text"><span class="icon">+</span>Upload image</div>' +
              '<img src="' + currentSrc + '"/>' +
              '<input type="file" accept="image/*" onchange="handleImageUpload(this,\'' + sectionKey + '\',\'' + el.dataset.field + '\')"/>' +
            '</div>';
        } else if (fieldType === 'avatar') {
          // Avatar handled above
          return;
        } else {
          var value = el.textContent.trim();
          var isLong = value.length > 60;
          var escapedValue = value.replace(/"/g, '&quot;');
          if (isLong) {
            group.innerHTML =
              '<label>' + label + '</label>' +
              '<textarea data-target-section="' + sectionKey + '" data-target-field="' + el.dataset.field + '" ' +
                'oninput="updateField(this)">' + value + '</textarea>';
          } else {
            group.innerHTML =
              '<label>' + label + '</label>' +
              '<input type="text" value="' + escapedValue + '" ' +
                'data-target-section="' + sectionKey + '" data-target-field="' + el.dataset.field + '" ' +
                'oninput="updateField(this)"/>';
          }
        }

        sectionDiv.appendChild(group);
      });

      fieldsContainer.appendChild(sectionDiv);
    });
  }

  function updateField(input) {
    var doc = mainFrame.contentDocument;
    if (!doc) return;
    var section = input.dataset.targetSection;
    var field = input.dataset.targetField;
    var target = doc.querySelector('[data-section="' + section + '"][data-field="' + field + '"]');
    if (target) {
      target.textContent = input.value;
    }
  }

  function handleImageUpload(fileInput, section, field) {
    var file = fileInput.files[0];
    if (!file) return;
    var url = URL.createObjectURL(file);
    var doc = mainFrame.contentDocument;
    if (doc) {
      var target = doc.querySelector('[data-section="' + section + '"][data-field="' + field + '"]');
      if (target && target.tagName === 'IMG') target.src = url;
    }
    var wrap = fileInput.closest('.image-upload');
    if (wrap) {
      wrap.classList.add('has-image');
      wrap.querySelector('img').src = url;
    }
  }

  function handleAvatarUpload(fileInput) {
    var file = fileInput.files[0];
    if (!file) return;
    var url = URL.createObjectURL(file);
    var doc = mainFrame.contentDocument;
    if (doc) {
      var avatarImg = doc.querySelector('[data-field-type="avatar"]');
      if (avatarImg) {
        avatarImg.src = url;
        avatarImg.style.display = 'block';
      }
    }
    var wrap = document.getElementById('avatar-upload');
    if (wrap) {
      wrap.classList.add('has-image');
      document.getElementById('avatar-preview').src = url;
    }
  }

  function downloadPDF() {
    var doc = mainFrame.contentDocument;
    if (!doc) return;
    var printWin = window.open('', '_blank');
    // Clone the HTML and inject print-fit CSS to force single A4 page
    var html = doc.documentElement.outerHTML;
    var fitCSS = '<style id="print-fit">' +
      '@page { size: A4; margin: 0; }' +
      '@media print {' +
        'html, body { width: 210mm; height: 297mm; margin: 0; padding: 0; overflow: hidden; }' +
        '.page { width: 210mm !important; height: 297mm !important; min-height: 0 !important; max-height: 297mm !important; overflow: hidden !important; page-break-after: avoid !important; page-break-inside: avoid !important; }' +
      '}' +
      '</style>';
    // Insert the fit CSS before </head>
    html = html.replace('</head>', fitCSS + '</head>');
    printWin.document.write(html);
    printWin.document.close();
    printWin.onload = function() {
      setTimeout(function() { printWin.print(); }, 500);
    };
  }

  selectTemplate(0);
</script>
</body>
</html>
