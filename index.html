<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pamphlet Prototypes — All 11</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: white; }

  .toolbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(10,10,10,0.92); backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .toolbar h1 { font-size: 13px; font-weight: 900; letter-spacing: -0.02em; flex-shrink: 0; }
  .toolbar h1 span { color: #BA2979; }

  .tabs {
    display: flex; gap: 3px; flex-wrap: wrap; justify-content: center;
    flex: 1; margin: 0 16px;
  }
  .tab {
    padding: 6px 14px; border-radius: 6px; border: none;
    font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.4);
    white-space: nowrap;
  }
  .tab:hover { background: rgba(255,255,255,0.08); color: white; }
  .tab.active { background: #BA2979; color: white; }
  .tab .tag {
    display: inline-block; font-size: 7px; font-weight: 800;
    background: rgba(255,255,255,0.15); padding: 1px 5px; border-radius: 3px;
    margin-left: 4px; vertical-align: middle; text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .tab.dark-tab.active { background: #1a1a2e; border: 1px solid #e84393; }

  .view-modes { display: flex; gap: 3px; flex-shrink: 0; }
  .view-btn {
    padding: 6px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.08);
    font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 600;
    cursor: pointer; background: transparent; color: rgba(255,255,255,0.4);
    transition: all 0.2s;
  }
  .view-btn:hover { border-color: rgba(255,255,255,0.2); color: white; }
  .view-btn.active { border-color: #BA2979; color: #BA2979; }

  .content { padding-top: 64px; }

  /* Single view */
  .single-view { display: flex; flex-direction: column; align-items: center; padding: 32px 20px; }
  .single-view iframe {
    width: 210mm; height: 297mm;
    border: none; border-radius: 4px;
    box-shadow: 0 20px 80px rgba(0,0,0,0.5);
    background: white;
  }
  .proto-label {
    text-align: center; padding: 14px;
    font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.3);
    letter-spacing: 0.06em; text-transform: uppercase;
  }

  /* Compare: 2-up row */
  .compare-view { padding: 24px; }
  .compare-row {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }
  .compare-card {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 10px; overflow: hidden;
    transition: border-color 0.2s;
  }
  .compare-card:hover { border-color: rgba(186,41,121,0.25); }
  .compare-card-header {
    padding: 12px 16px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .compare-card-header h3 { font-size: 11px; font-weight: 800; }
  .compare-card-header .style-tag {
    font-size: 7px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.08em; color: #BA2979;
    background: rgba(186,41,121,0.1); padding: 2px 7px; border-radius: 3px;
  }
  .compare-card iframe {
    width: 100%; height: 520px; border: none; background: white;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="toolbar">
  <h1><span>LP</span> Prototypes</h1>
  <div class="tabs" id="tabs"></div>
  <div class="view-modes">
    <button class="view-btn active" onclick="setView('single')">Single</button>
    <button class="view-btn" onclick="setView('compare')">Compare</button>
  </div>
</div>

<div class="content">
  <div id="single-view" class="single-view">
    <iframe id="single-frame" src="pamphlet-v1-editorial.html"></iframe>
    <div class="proto-label" id="single-label"></div>
  </div>

  <div id="compare-view" class="compare-view hidden">
    <div class="compare-row" id="compare-row"></div>
  </div>
</div>

<script>
  const versions = [
    { file: 'pamphlet-v1-editorial.html', name: 'V1', tag: 'Bold Editorial', pages: '2 pág', dark: false },
    { file: 'pamphlet-v2-executive.html', name: 'V2', tag: 'Executive', pages: '1 pág', dark: false },
    { file: 'pamphlet-v3-minimalist.html', name: 'V3', tag: 'Minimalist', pages: '1 pág', dark: false },
    { file: 'pamphlet-v4-dark.html', name: 'V4', tag: 'Dark Mode', pages: '1 pág', dark: true },
    { file: 'pamphlet-v5-magazine.html', name: 'V5', tag: 'Magazine', pages: '1 pág', dark: false },
    { file: 'pamphlet-v6-corporate.html', name: 'V6', tag: 'Corporate', pages: '1 pág', dark: false },
    { file: 'pamphlet-v7-gradient.html', name: 'V7', tag: 'Gradient', pages: '1 pág', dark: false },
    { file: 'pamphlet-v8-dark-alt.html', name: 'V8', tag: 'Dark Alt', pages: '1 pág', dark: true },
    { file: 'pamphlet-v9-asymmetric.html', name: 'V9', tag: 'Asymmetric', pages: '1 pág', dark: false },
    { file: 'pamphlet-v10-swiss.html', name: 'V10', tag: 'Swiss Grid', pages: '1 pág', dark: false },
    { file: 'pamphlet-v11-sidebar.html', name: 'V11', tag: 'Sidebar', pages: '1 pág', dark: false },
  ];

  let currentTab = 0;

  // Build tabs
  const tabsEl = document.getElementById('tabs');
  versions.forEach((v, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '') + (v.dark ? ' dark-tab' : '');
    btn.innerHTML = v.name + ' <span class="tag">' + v.tag + '</span>';
    btn.onclick = () => showTab(i);
    tabsEl.appendChild(btn);
  });

  // Build compare cards
  const compareRow = document.getElementById('compare-row');
  versions.forEach(v => {
    compareRow.innerHTML += `
      <div class="compare-card">
        <div class="compare-card-header">
          <h3>${v.name} — ${v.tag}</h3>
          <span class="style-tag">${v.pages}</span>
        </div>
        <iframe src="${v.file}" loading="lazy"></iframe>
      </div>`;
  });

  function showTab(i) {
    currentTab = i;
    document.querySelectorAll('.tab').forEach((t, idx) => t.classList.toggle('active', idx === i));
    document.getElementById('single-frame').src = versions[i].file;
    document.getElementById('single-label').textContent = versions[i].name + ' — ' + versions[i].tag + ' · ' + versions[i].pages;
  }

  function setView(mode) {
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    if (mode === 'single') {
      document.getElementById('single-view').classList.remove('hidden');
      document.getElementById('compare-view').classList.add('hidden');
      document.querySelectorAll('.view-btn')[0].classList.add('active');
    } else {
      document.getElementById('single-view').classList.add('hidden');
      document.getElementById('compare-view').classList.remove('hidden');
      document.querySelectorAll('.view-btn')[1].classList.add('active');
    }
  }

  showTab(0);
</script>
</body>
</html>
